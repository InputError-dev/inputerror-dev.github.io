{{ define "main" }}
<ul class="post-list">
  {{ range where .Pages "Section" "posts" }}
  {{ if not .Draft }}
  <li class="post-item">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <span class="post-meta">{{ .Date.Format "2006-01-02" }}</span>
    <p class="post-summary">{{ .Summary | plainify | truncate 200 }}</p>
  </li>
  {{ end }}
  {{ end }}
</ul>
{{ end }}
